# pdf2md 字段级准确率 ground truth
#
# 数据来源：PyMuPDF 抽的 PDF 原文（天津真格/苏州济峰/IDG 是 native 可靠）。
# 乱码 PDF（昆山峰瑞）和扫描件（广州越秀）的 baseline 不可用，需人眼对 PDF
# 填入；目前留空，只评召回率。
#
# 归一化：千分位、全角半角、大小写、空白都会归一化后做 substring 匹配，
# 所以填 "897000000" 能命中 MD 里的 "¥897,000,000" 或 "¥ 897,000,000"。

